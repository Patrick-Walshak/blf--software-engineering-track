<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: black;">
        <h2 style="display: flex; justify-content: center; align-items: center; margin-top: 200px;">CORLOR CHANGER AND SOUND
        </h2>
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; ">
            <div id="circle" style="height: 300px; width: 300px; border: 2px solid purple; box-shadow: inset 2px 2px 10px white; border-radius: 100%;"></div>
            <div style="margin-top: 20px;">
                <button style="cursor: pointer; width:100px; height: 60px;  border: 2px solid purple; box-shadow: inset 2px 2px 10px white; background-color: black; color: white; font-weight: bolder;" id="blue">Blue</button>
                <!-- <audio id="clickSound" src="gta-san-andreas-mission-complete-sound-hq.mp3"></audio> -->
        
                <button style="cursor: pointer; width:100px; height: 60px;  border: 2px solid purple; box-shadow: inset 2px 2px 10px white; background-color: black; color: white; font-weight: bolder;" id="red">Red</button>
        
                <button style="cursor: pointer; width:100px; height: 60px;  border: 2px solid purple; box-shadow: inset 2px 2px 10px white; background-color: black; color: white; font-weight: bolder;" id="reset">Reset</button>
        
            </div>
        </div>
    <script>
        let color = document.querySelector("#circle")

        let blue = document.querySelector("#blue")
        let red = document.querySelector("#red")
        let purple = document.querySelector("#purple")

        const blueSound = new Audio("./purple.mp3");
        const redSound = new Audio("./indian-song.mp3");

        blue.addEventListener("click", () => {

            color.style.backgroundColor = "blue";

            redSound.pause();
            redSound.currentTime = 0;

            blueSound.currentTime = 0;
            blueSound.play();

        })

        red.addEventListener("click", () => {

            color.style.backgroundColor = "red";

            blueSound.pause();
            blueSound.currentTime = 0;

            redSound.currentTime = 0;
            redSound.play();

        })

        reset.addEventListener("click", () => {
            color.style.backgroundColor ="white"
            blueSound.pause()
            redSound.pause()

            blueSound.currentTime = 0;
            redSound.currentTime = 0;
        })

    </script>
</body>
</html>

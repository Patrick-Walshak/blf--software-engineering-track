<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notes App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .app {
      width: 100%;
      max-width: 600px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .notes {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .note {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .delete {
      background: #ef4444;
    }

    .delete:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>

  <div class="app">
    <h1>📝 Notes</h1>

    <div class="input-area">
      <input type="text" id="noteInput" placeholder="Write a note..." />
      <button onclick="addNote()">Add</button>
    </div>

    <div class="notes" id="notesContainer"></div>
  </div>

  <script>
    let notes = JSON.parse(localStorage.getItem("notes")) || [];

    const input = document.getElementById("noteInput");
    const container = document.getElementById("notesContainer");

    function saveNotes() {
      localStorage.setItem("notes", JSON.stringify(notes));
    }

    function renderNotes() {
      container.innerHTML = "";

      notes.forEach((note, index) => {
        const div = document.createElement("div");
        div.className = "note";

        div.innerHTML = `
          <span>${note}</span>
          <button class="delete" onclick="deleteNote(${index})">Delete</button>
        `;

        container.appendChild(div);
      });
    }

    function addNote() {
      const value = input.value.trim();

      if (value === "") return;

      notes.push(value);
      saveNotes();
      renderNotes();

      input.value = "";
    }

    function deleteNote(index) {
      notes.splice(index, 1);
      saveNotes();
      renderNotes();
    }

    // Initial render
    renderNotes();
  </script>

</body>
</html>

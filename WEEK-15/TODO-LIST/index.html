<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <title>My Todo List</title>
</head>

<body class="bg-blue-950">
    <main class="px-4 sm:px-6 md:px-10">
        <div class="w-full max-w-xl mx-auto mt-20 sm:mt-32 md:mt-44 border border-black rounded-2xl bg-gray-400 p-4">

            <div class=" flex justify-center mx-auto mt-5">
                <h1 class="text-4xl font-bold font-serif">My Todo List</h1>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-3 sm:gap-5 mx-auto">

                <div class="ml-10">
                    <input id="taskInput" class="w-full sm:w-80 h-12 sm:h-14 border mt-4 sm:mt-8 border-black bg-white rounded-lg pl-2"
                        type="text" placeholder="Enter task">
                </div>

                <button id="addBtn"
                    class="w-full sm:w-16 h-12 sm:h-14 mt-2 sm:mt-8 border border-black bg-blue-950 hover:bg-blue-600 transition duration-300 ease-in-out hover:scale-110 rounded-lg text-white font-bold cursor-pointer">
                    Add
                </button>
   


            </div>

            <ul class="mt-4 mb-2 mx-auto font-extrabold bg-purple-200 rounded-lg p-4 w-full max-w-sm sm:max-w-md" id="todoList"></ul>
        </div>
    </main>
    <script>

        let todos = []

        let addBtn = document.querySelector("#addBtn")
        let todoList = document.querySelector("#todoList")
        let taskInput = document.querySelector("#taskInput")

        function renderTodos() {
            todoList.innerHTML = ""
            todos.forEach((todo, index) => {
                let li = document.createElement("li")
                li.classList.add("bg-white","p-2","rounded-lg","mb-2","flex","justify-between","items-center")

                let span = document.createElement("span")

                span.textContent = todo.text
                if (todo.completed) {
                    span.classList.add(
                        "line-through",
                        "opacity-50"
                    )
                }
                let buttonContainer = document.createElement("div")
                buttonContainer.classList.add("flex","gap-2")

                let completeBtn = document.createElement("button")
                completeBtn.textContent = todo.completed ? "Undo" : "Complete"
                completeBtn.classList.add("bg-green-500","text-white","px-2","py-1","rounded")
                completeBtn.addEventListener("click", () => {
                    todo.completed = !todo.completed
                    renderTodos()
                })
                let deleteBtn = document.createElement("button")
                deleteBtn.textContent = "Delete"
                deleteBtn.classList.add("bg-red-500", "text-white", "px-2", "py-1", "rounded")
                deleteBtn.addEventListener("click", () => {
                    todos.splice(index, 1)

                })
                buttonContainer.appendChild(completeBtn)
                buttonContainer.appendChild(deleteBtn)
                li.appendChild(span)
                li.appendChild(buttonContainer)
                todoList.appendChild(li)
            })
        }

        addBtn.addEventListener("click", () => {
            let todoValue = taskInput.value
            if (todoValue === "") {
                return
            }
            let todo = {
                text: todoValue,
                completed: false
            }
            todos.push(todo)
            renderTodos()
            taskInput.value = ""
            console.log("Button Clicked")
        })

    </script>
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/output.css">
    <title>My Todo List</title>
</head>

<body class="bg-blue-950">
    <main class="px-4 sm:px-6 md:px-10">
        <div class="w-full max-w-xl mx-auto mt-20 sm:mt-32 md:mt-44 border border-black rounded-2xl bg-gray-400 p-4">

            <div class=" flex justify-center mx-auto mt-5">
                <h1 class="text-4xl font-bold font-serif">My Todo List</h1>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-3 sm:gap-5 mx-auto">

                <div class="ml-10">
                    <input id="taskInput" class="w-full sm:w-80 h-12 sm:h-14 border mt-4 sm:mt-8 border-black bg-white rounded-lg pl-2"
                        type="text" placeholder="Enter task">
                </div>

                <button id="addBtn"
                    class="w-full sm:w-16 h-12 sm:h-14 mt-2 sm:mt-8 border border-black bg-blue-950 hover:bg-blue-600 transition duration-300 ease-in-out hover:scale-110 rounded-lg text-white font-bold cursor-pointer">
                    Add
                </button>
   


            </div>

            <ul class="flex gap-4 flex-wrap mt-4 mb-2 mx-auto font-extrabold  rounded-lg p-4 w-full max-w-sm sm:max-w-md" id="todoList"></ul>
        </div>
    </main>
    <script>
    // after u fetch post then use user id to fetch the user details 

    let todoUrl = "https://jsonplaceholder.typicode.com/posts/"

            fetch(todoUrl)
            .then((res) => res.json())
            .then((data) => {

                let todoList = document.querySelector("#todoList")

                data.forEach((post) => {

                fetch(`https://jsonplaceholder.typicode.com/users/${post.userId}`)
                    .then((res) => res.json())
                    .then((user) => {

                    let listItem = document.createElement("li")

                    listItem.innerText = `${post.title} - ${user.username}`

                    listItem.className = "bg-white p-3 rounded-lg mb-2"

                    todoList.appendChild(listItem)

                    // console.log(user.username)
                    console.log(post)

                    })

                })

            })
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <input type="text" class="user-Id"><br>
        <input type="text" class="title"><br>
        <!-- <input type="text"> -->
    </form>
    <select id="isCompleted">
        <option value="true">Yes</option>
        <option value="fale">No</option>
    </select>
    <button id="addTodo">Add</button>


    <ul id="todoList"></ul>
    <script>
        
        let addTodo =  document.getElementById("addTodo")


        addTodo.addEventListener("click", () =>{
            const userId = document.getElementById("user-Id")
            const title = document.getElementById("title")
            const isCompleted = document.getElementById("isCompleted")


             let todos = fetch("https://jsonplaceholder.typicode.com/todos/", {
                method: "POST",
                body:JSON.stringify({
                    userId:userId,
                    title:title,
                    isCompleted:isCompleted
            
                })
            })

            todos
            .then((res) => {
            if(!res.ok){
                if(res.status === 429){
                    throw new Error("Too many request")
                }

                if(res.status === 409){
                    throw new Error("User with email or username already exist")
                }
            }
        })
        

        })
        
        
        

        
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login & Signup UI</title>
</head>
<body>

  <div>
    <h2>Login</h2>
    <input type="text" id="loginEmail" placeholder="Email" /> <br/><br/>
    <input type="password" id="loginPassword" placeholder="Password" /> <br/><br/>
    <button id="loginBtn">Login</button>
  </div>

  <hr />

  <div>
    <h2>Sign Up</h2>
    <input type="text" id="signupName" placeholder="Name" /> <br/><br/>
    <input type="text" id="signupEmail" placeholder="Email" /> <br/><br/>
    <input type="password" id="signupPassword" placeholder="Password" /> <br/><br/>
    <button id="signupBtn">Register</button>
  </div>

  <script>
    let newUser = []
    signupBtn.addEventListener("click", () => {
        const name = document.getElementById("signupName").value
        const email = document.getElementById("signupEmail").value
        const password = document.getElementById("signupPassword").value
        let signupBtn = document.getElementById("signupBtn")


        let users = JSON.parse(localStorage.getItem("users")) || []

        let newuser = 
            {
                name: name,
                email: email,
                password: password
            }

        if(name && email &&  password){
            users.push(newuser)
            localStorage.setItem("users", JSON.stringify(users))
            alert("Sign Successfully!")
        }
               
    })

    const loginEmail = document.getElementById("loginEmail")
    const password = document.getElementById("loginPassword")
    const button = document.getElementById("loginBtn")

    let users = JSON.parse(localStorage.getItem("users")) || []

    loginBtn.addEventListener("click", () =>{

        let foundUser = users.find(user => 
        user.email === loginEmail.value &&
        user.password === password.value
    )

    if(foundUser){
        alert("Login successful")
    }else{
        alert("Invalid email or password")
    }

        console.log(loginEmail.value)
        console.log(password.value)
    })

    
  </script>
</body>
</html>

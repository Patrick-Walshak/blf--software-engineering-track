<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Weather App</title>
  <link rel="stylesheet" href="/src/output.css">
</head>
<body class="bg-[#F6FAFD] min-h-screen flex items-center justify-center p-6 font-sans">

  <div class="w-full max-w-5xl bg-white rounded-[40px] shadow-2xl overflow-hidden grid lg:grid-cols-2">

    <!-- LEFT SECTION -->
    <div class="bg-[#0A1931] p-10 text-white flex flex-col justify-between relative overflow-hidden">

      <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[radial-gradient(circle_at_top_left,_white,_transparent_40%)]"></div>

      <div class="relative z-10">
        <h1 class="text-3xl font-bold tracking-wide">Weatherly</h1>
        <p class="text-[#B3CFE5] mt-2 text-sm">
          Elegant weather forecast experience
        </p>
      </div>

      <div class="relative z-10 mt-20">
        <p class="text-[#B3CFE5] text-lg">Today</p>

        <div class="flex items-center gap-4 mt-4">
          <div class="text-7xl font-bold">28°</div>
          <div>
            <p class="text-2xl font-semibold">Abuja</p>
            <p class="text-[#B3CFE5]">Cloudy Weather</p>
          </div>
        </div>

        <div class="mt-10 flex items-center gap-3">
          <div class="w-14 h-14 rounded-2xl bg-[#1A3D63] flex items-center justify-center text-2xl">
            ☁️
          </div>

          <div>
            <p class="font-medium">Moderate Cloud</p>
            <p class="text-[#B3CFE5] text-sm">Feels like 30°C</p>
          </div>
        </div>
      </div>

      <div class="relative z-10 mt-20 grid grid-cols-3 gap-4">

        <div class="bg-[#1A3D63] rounded-2xl p-4 text-center">
          <p class="text-[#B3CFE5] text-sm">Humidity</p>
          <h2 class="text-xl font-bold mt-2">85%</h2>
        </div>

        <div class="bg-[#1A3D63] rounded-2xl p-4 text-center">
          <p class="text-[#B3CFE5] text-sm">Wind</p>
          <h2 class="text-xl font-bold mt-2">12km/h</h2>
        </div>

        <div class="bg-[#1A3D63] rounded-2xl p-4 text-center">
          <p class="text-[#B3CFE5] text-sm">Pressure</p>
          <h2 class="text-xl font-bold mt-2">1012</h2>
        </div>

      </div>
    </div>

    <!-- RIGHT SECTION -->
    <div class="p-10 bg-[#F6FAFD] flex flex-col justify-between">

      <div>
        <div class="flex items-center gap-4">

          <input
            type="text"
            placeholder="Search location..."
            class="flex-1 bg-white p-4 rounded-2xl outline-none border border-[#DDEAF3] focus:border-[#4A7FA7] transition"
          />

          <button class="bg-[#4A7FA7] hover:bg-[#1A3D63] transition text-white px-6 py-4 rounded-2xl font-medium shadow-lg">
            Search
          </button>

        </div>

        <div class="mt-12">
          <h2 class="text-2xl font-bold text-[#0A1931]">
            Weekly Forecast
          </h2>

          <div class="mt-6 space-y-4">

            <div class="bg-white rounded-2xl p-5 flex items-center justify-between shadow-sm">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-[#B3CFE5] rounded-xl flex items-center justify-center text-xl">
                  ☀️
                </div>

                <div>
                  <p class="font-semibold text-[#0A1931]">Monday</p>
                  <p class="text-sm text-gray-500">Sunny Day</p>
                </div>
              </div>

              <h2 class="text-xl font-bold text-[#1A3D63]">30°</h2>
            </div>

            <div class="bg-white rounded-2xl p-5 flex items-center justify-between shadow-sm">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-[#B3CFE5] rounded-xl flex items-center justify-center text-xl">
                  🌧️
                </div>

                <div>
                  <p class="font-semibold text-[#0A1931]">Tuesday</p>
                  <p class="text-sm text-gray-500">Light Rain</p>
                </div>
              </div>

              <h2 class="text-xl font-bold text-[#1A3D63]">22°</h2>
            </div>

            <div class="bg-white rounded-2xl p-5 flex items-center justify-between shadow-sm">
              <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-[#B3CFE5] rounded-xl flex items-center justify-center text-xl">
                  ☁️
                </div>

                <div>
                  <p class="font-semibold text-[#0A1931]">Wednesday</p>
                  <p class="text-sm text-gray-500">Cloudy</p>
                </div>
              </div>

              <h2 class="text-xl font-bold text-[#1A3D63]">25°</h2>
            </div>

          </div>
        </div>
      </div>

      <div class="mt-10 bg-[#B3CFE5] rounded-3xl p-6 flex items-center justify-between">

        <div>
          <p class="text-[#1A3D63] font-medium">Air Quality</p>
          <h2 class="text-3xl font-bold text-[#0A1931] mt-2">Good</h2>
        </div>

        <div class="w-20 h-20 rounded-full border-8 border-[#1A3D63] flex items-center justify-center text-[#1A3D63] font-bold text-xl bg-white">
          72
        </div>

      </div>

    </div>

  </div>

</body>
</html>

<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
</head>

<body style="background-color: rgba(0, 0, 255, 0.486);">
    <div style="display: flex; justify-content: center; align-items: center;">
        <div style="width: 1000px; height: -600px; border:solid black;">
            <h1>Camera</h1>
            <p id="isOnLine">Checking internet connectivity</p>

            <div>

                <video id="camerafeed" autoplay width="300" height="300"></video>

                <div><button id="capture">Say Cheese</button></div>

                <canvas id="image"></canvas>

            </div>
        </div>
    </div>

    <script>
        let camerafeed = document.querySelector("#camerafeed")
        let canvas = document.querySelector("#image")

        navigator.mediaDevices.getUserMedia({
            video: true,
            audio: true
        }).then((stream) => {
            console.log(stream)
            camerafeed.srcObject = stream
        })

        let capture = document.querySelector("#capture")

        capture.addEventListener('click', () => {
            let ctx = canvas.getContext("2d")

            canvas.width = camerafeed.videoWidth
            canvas.height = camerafeed.videoHeight

            ctx.drawImage(camerafeed, 0, 0)
        })

        let isOnline = document.querySelector("#isOnLine")

        setInterval(() => {
            if (navigator.onLine) {
                isOnline.innerText = "User is connected"
            } else {
                isOnline.innerText = "User is disconnected"
            }
        }, 1000)
    </script>
</body>

</html>
